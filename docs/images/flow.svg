<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540">
  <defs>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#2563eb"/></marker>
    <marker id="av" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7 Z" fill="#7c3aed"/></marker>
    <style>text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif}.m{font-family:"SF Mono",SFMono-Regular,ui-monospace,Menlo,monospace}</style>
  </defs>
  <rect width="1200" height="540" fill="#ffffff"/>
  <rect x="40" y="120" width="240" height="200" rx="14" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" stroke-dasharray="7,4"/>
  <text x="160" y="156" font-size="15" font-weight="700" fill="#334155" text-anchor="middle">YOUR AGENT LOOP</text>
  <g font-size="12.5" fill="#64748b" text-anchor="middle">
    <text x="160" y="182">yoagent, yoyo, or any</text>
    <text x="160" y="200">Rust loop of your own</text>
    <text x="160" y="240">holds no durable state —</text>
    <text x="160" y="258" font-weight="600" fill="#334155">crash it, swap it, rewrite it</text>
  </g>
  <path d="M 280,190 L 416,190" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#ab)"/>
  <rect x="292" y="168" width="114" height="16" fill="#ffffff" opacity="0.95"/>
  <text x="348" y="180" font-size="11.5" fill="#2563eb" text-anchor="middle" class="m">record</text>
  <g font-size="10" fill="#94a3b8" text-anchor="middle" class="m">
    <text x="348" y="208">record_goal</text>
    <text x="348" y="222">propose_patch</text>
    <text x="348" y="236">record_eval</text>
    <text x="348" y="250">record_decision</text>
  </g>
  <rect x="420" y="60" width="360" height="330" rx="14" fill="#ffffff" stroke="#2563eb" stroke-width="2.5"/>
  <text x="600" y="94" font-size="15" font-weight="700" fill="#1e40af" text-anchor="middle">THE LOG — SOURCE OF TRUTH</text>
  <text x="600" y="114" font-size="12" fill="#64748b" text-anchor="middle" class="m">state/events.jsonl &#183; append-only</text>
  <rect x="444" y="132" width="312" height="104" rx="9" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="600" y="156" font-size="12" font-weight="600" fill="#1d4ed8" text-anchor="middle">every helper appends a linked pair</text>
  <g font-size="11" text-anchor="middle" class="m">
    <text x="600" y="180" fill="#475569">patch.proposed         &#8592; the audit layer</text>
    <text x="600" y="200" fill="#475569">state.ops_applied      &#8592; the graph delta</text>
  </g>
  <text x="600" y="222" font-size="10.5" fill="#94a3b8" text-anchor="middle">causation-linked, mechanically checkable</text>
  <text x="600" y="266" font-size="12" font-weight="600" fill="#475569" text-anchor="middle">pluggable store</text>
  <rect x="454" y="282" width="292" height="40" rx="9" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="470" y="300" font-size="12" font-weight="600" fill="#475569" class="m">MemoryEventStore</text>
  <text x="470" y="315" font-size="10" fill="#94a3b8">tests</text>
  <rect x="454" y="328" width="292" height="40" rx="9" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="470" y="346" font-size="12" font-weight="600" fill="#475569" class="m">GitEventStore</text>
  <text x="470" y="361" font-size="10" fill="#94a3b8">fsync &#183; lease &#183; run commits</text>
  <path d="M 780,190 L 916,190" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#av)"/>
  <rect x="792" y="168" width="114" height="16" fill="#ffffff" opacity="0.95"/>
  <text x="848" y="180" font-size="11.5" fill="#7c3aed" text-anchor="middle" class="m">load = fold</text>
  <text x="848" y="210" font-size="10" fill="#94a3b8" text-anchor="middle">replay ops into the</text>
  <text x="848" y="224" font-size="10" fill="#94a3b8" text-anchor="middle">projection &#8212; deterministic</text>
  <rect x="920" y="60" width="240" height="330" rx="14" fill="#faf9ff" stroke="#c4b5fd" stroke-width="2"/>
  <text x="1040" y="94" font-size="15" font-weight="700" fill="#6d28d9" text-anchor="middle">THE GRAPH</text>
  <text x="1040" y="114" font-size="12" fill="#64748b" text-anchor="middle">typed projection &#183; disposable</text>
  <rect x="995" y="135" width="90" height="30" rx="8" fill="#ffffff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="1040" y="154" font-size="11.5" font-weight="700" fill="#6d28d9" text-anchor="middle" class="m">goal</text>
  <rect x="985" y="201" width="110" height="30" rx="8" fill="#7c3aed" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="1040" y="220" font-size="11.5" font-weight="700" fill="#ffffff" text-anchor="middle" class="m">patch</text>
  <rect x="945" y="270" width="80" height="30" rx="8" fill="#ffffff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="985" y="289" font-size="11.5" font-weight="700" fill="#6d28d9" text-anchor="middle" class="m">eval</text>
  <rect x="1052" y="270" width="96" height="30" rx="8" fill="#ffffff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="1100" y="289" font-size="11.5" font-weight="700" fill="#6d28d9" text-anchor="middle" class="m">decision</text>
  <line x1="1040" y1="201" x2="1040" y2="169" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#av)"/>
  <line x1="1012" y1="231" x2="992" y2="266" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#av)"/>
  <line x1="1068" y1="231" x2="1092" y2="266" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#av)"/>
  <rect x="944" y="320" width="192" height="48" rx="9" fill="#ffffff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="1040" y="340" font-size="11.5" font-weight="600" fill="#6d28d9" text-anchor="middle" class="m">lineage(id)</text>
  <text x="1040" y="357" font-size="10.5" fill="#94a3b8" text-anchor="middle">&#8220;why does this exist?&#8221;</text>
  <rect x="40" y="440" width="1120" height="70" rx="14" fill="#f0f7ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="70" y="470" font-size="14" font-weight="700" fill="#1e40af">The log is the agent&#8217;s memory.</text>
  <text x="70" y="493" font-size="12.5" fill="#475569">Appended = durable (crash-safe). The graph is disposable &#8212; delete it, fold again, nothing is lost. Commit the log to git and the whole memory travels with a clone.</text>
</svg>